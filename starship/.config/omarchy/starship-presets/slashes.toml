# SLASHES вЂ” diagonal slash separators, neon on dark
# Pattern:  OS  в•±  dir  в•І  git  в•±  lang 
# Mixes backslash (\ue0b9) and forwardslash (\ue0bd) for a zig-zag rhythm
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

format = """
[\ue0b9](fg:bg bg:orange)\
$os\
[\ue0bd](fg:orange bg:purple)\
$directory\
[\ue0b9](fg:purple bg:pink)\
$git_branch\
$git_status\
[\ue0bd](fg:pink bg:cyan)\
$nodejs$python$rust$golang$java$kotlin\
[\ue0b9](fg:cyan)\
$line_break\
$character"""

palette = 'slashes'

[palettes.slashes]
bg      = '#0d0d1a'
orange  = '#ff6d00'
purple  = '#7c3aed'
pink    = '#db2777'
cyan    = '#0891b2'
bright  = '#f8fafc'
dim     = '#0d0d1a'

[os]
disabled = false
style = "bg:orange fg:dim"
format = '[ $symbol ]($style)'

[os.symbols]
Arch    = "у°Ј‡"
Linux   = "у°ЊЅ"
Macos   = "у°Ђµ"
Ubuntu  = "у°•€"

[directory]
style = "bg:purple fg:bright"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вЂ¦/"

[git_branch]
symbol = " "
style = "bg:pink fg:bright"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "bg:pink fg:bright"
format = '[$all_status$ahead_behind]($style)'
conflicted = "у±ѓЌ "
ahead      = "у°¶ЈГ—${count} "
behind     = "у°¶ЎГ—${count} "
diverged   = "у°№є "
untracked  = " "
modified   = " "
staged     = "у°ђ• "
deleted    = " "

[nodejs]
symbol = " "
style = "bg:cyan fg:dim"
format = '[ $symbol$version ]($style)'

[python]
symbol = " "
style = "bg:cyan fg:dim"
format = '[ $symbol$version ]($style)'

[rust]
symbol = " "
style = "bg:cyan fg:dim"
format = '[ $symbol$version ]($style)'

[golang]
symbol = " "
style = "bg:cyan fg:dim"
format = '[ $symbol$version ]($style)'

[java]
symbol = " "
style = "bg:cyan fg:dim"
format = '[ $symbol$version ]($style)'

[kotlin]
symbol = " "
style = "bg:cyan fg:dim"
format = '[ $symbol$version ]($style)'

[character]
success_symbol = '[вќЇ](bold #0891b2)'
error_symbol   = '[вќЇ](bold #ff6d00)'

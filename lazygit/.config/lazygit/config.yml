customCommands:
  - key: '<c-a>'
    context: 'files'
    description: 'AI atomic commits (sgc)'
    command: 'zsh -i -c "sgc"'
    loadingText: 'sgc: analyzing changes…'
    output: terminal
  - key: '<c-g>'
    context: 'files'
    description: 'AI single commit (gc)'
    command: 'zsh -i -c "msg=\$(gc) && [[ -n \"\$msg\" ]] && git commit -m \"\$msg\""'
    loadingText: 'gc: generating commit message…'
    output: terminal

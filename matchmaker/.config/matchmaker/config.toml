[tui]
percentage = 45
min = 5
max = 20

[preview]
show = true
wrap = true

[start]
command = 'fd --hidden --type f --type d --exclude .git'

[[preview.layout]]
command = 'eza -T --icons --level=3 {}'
side = 'right'
percentage = 100
min = 100

[results]
scroll_wrap = true
wrap = false
autoscroll.end = true
autoscroll.context = 0
reverse = false

[matcher]
sort_threshold = 0

[exit]
abort_empty = true
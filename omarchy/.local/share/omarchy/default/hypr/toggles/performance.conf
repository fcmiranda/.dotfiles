# Performance mode: disable expensive visual effects for weaker hardware.
# Managed by omarchy-toggle-performance — do not edit directly.

decoration {
    rounding = 0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

# Remove window transparency so the compositor skips blending passes
windowrule = opacity 1.0 1.0, match:tag default-opacity

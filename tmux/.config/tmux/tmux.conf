# Tmux configuration file
# Basic settings
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g mouse on
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g extended-keys on

# Colors from current Omarchy theme (auto-generated)
source-file ~/.config/omarchy/current/theme/tmux-colors.conf

# panes
set -g allow-passthrough on
# message/mode styles are set directly in the generated tmux-colors.conf

# Pin plugin manager path to ~/.tmux/plugins where all plugins are installed
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# tmux battery and tmux online status should be before tmux catppuccin
# Plugin management section
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-change-path 'true'
set -g @floax-title 'fecavmi'

# Nerdfont characters
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"

set-option -g status-position top

# Basic colors of the Statusbar are set in the generated tmux-colors.conf

# Show the window list centered between the left and the right section
set-option -g status-justify left

# Style and set contents on the left section
# Pill background turns CURRENT_COLOR when prefix is active
set-option -g status-left "\
#[fg=#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}},bg=default]${HALF_ROUND_OPEN}\
#[bg=#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}},fg=#{?client_prefix,#{@SESSION_ACTIVE_FG},#{@SESSION_COLOR}}]#{?client_prefix,⌨ ,}#S \
#[fg=#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}},bg=default]${TRIANGLE_CLOSE}  \
"

# Style and set contents on the right section
set-option -g status-right "\
#[fg=#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}},bg=default]${TRIANGLE_OPEN}\
#[bg=#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}},fg=#{?client_prefix,#{@SESSION_ACTIVE_FG},#{@HOST_COLOR}}] 󰮯 󱙝󱙝󱙝 \
#[fg=#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}},bg=default]${HALF_ROUND_CLOSE}   \
"

# Set max length of left and right section
set-option -g status-left-length 100
set-option -g status-right-length 100

# Style and set content for the inactive windows
set-option -g window-status-format "  #I:#W  "

# Style and set content for the active windows: Highlight with a prefix star and bold color
set-option -g window-status-current-format "  #[fg=#{@CURRENT_COLOR},bold]󰧞 #W  "

# Use spacing as the separator for a cleaner look
set-option -g window-status-separator " "

# pane border look and feel
# pane-border-style is set in the generated tmux-colors.conf
set -g pane-active-border-style "fg=#{?client_prefix,#{@PREFIX_COLOR},#{@ACTIVE_BORDER_COLOR}},bg=default"
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on

# bind Scrollback - captures pane with ANSI colors and opens in nvim with baleia.nvim (view-only)
bind-key C-e run-shell "tmux capture-pane -epS - | grep -vE '|||' | sed '/^$/d' > /tmp/tmux_scrollback.ansi && tmux new-window 'nvim -c \"BaleiaColorize\" -c \"setlocal nomodified nomodifiable\" -c \"normal G\" /tmp/tmux_scrollback.ansi'"

# Scrollback
setw -g mode-keys vi

# Use xclip for copying to the system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Increase scroll history
set-option -g history-limit 10000

# start index at 1
set -g base-index 0
set -g pane-base-index 0

# renumber when window is closed
set -g renumber-window on

 # zero-out escape time delay to make key bindings more responsive (especially for vim users)
set -g escape-time 0

# key bindings
set -g prefix C-Space
bind C-Space send-prefix
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

# Create vertical split
unbind '|'
bind '|' split-window -h

# Create horizontal split
unbind '-'
bind - split-window -v

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Switch windows directly with Ctrl+number (no prefix needed)
bind-key -n 'C-`' select-window -t 0
bind-key -n 'C-1' select-window -t 1
bind-key -n 'C-2' select-window -t 2
bind-key -n 'C-3' select-window -t 3
bind-key -n 'C-4' select-window -t 4
bind-key -n 'C-5' select-window -t 5
bind-key -n 'C-6' select-window -t 6
bind-key -n 'C-7' select-window -t 7
bind-key -n 'C-8' select-window -t 8
bind-key -n 'C-9' select-window -t 9

# Sesh session management with gum
bind-key "K" display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --placeholder 'Pick a sesh' --prompt='⚡'
)\""

# Sesh session management (popup, larger view)
bind-key "P" display-popup -E -w 80% -h 80% "sesh connect \"$(
  sesh list --icons | fzf --no-sort --ansi --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)'
)\""

# Sesh session management with fzf-tmux
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

  # Popup utilities
  bind-key "B" display- up -E -w 90% -h 90% "btop"
  bind-key "G" display-popup -E -w 90% -h 90% "lazygit"
  bind-key "Y" display-popup -E -w 90% -h 90% "yazi"
  bind-key "N" display-popup -E -w 90% -h 90% "nvim"
  bind-key "C" clock-mode

# Window navigation (vim motions)
bind -r l next-window
bind -r h previous-window
bind -r Tab last-window
bind -r w kill-pane
bind-key -r t new-window -c '#{pane_current_path}'
bind -r c choose-window

# Session navigation
bind L switch-client -n  # next session
bind H switch-client -p  # prev session
bind W kill-session      # kill current session

# Pane resize (no prefix, Alt+arrow or Alt+hjkl)
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5
bind -n M-H     resize-pane -L 5
bind -n M-L     resize-pane -R 5
bind -n M-K     resize-pane -U 5
bind -n M-J     resize-pane -D 5

bind -N "last-session (via sesh)" L run-shell "sesh last || tmux display-message -d 1000 'Only one session'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf.)
run '~/.tmux/plugins/tpm/tpm'
# ==============================================================================
# Application Bindings
# ==============================================================================
$terminal = uwsm-app -- xdg-terminal-exec
$browser  = omarchy-launch-browser

# -- Core Applications --
bindd = SUPER,           RETURN, Terminal,          exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT,       RETURN, Tmux,              exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER SHIFT,     F,      Yazi,              exec, uwsm-app -- ghostty -e zsh -c 'tmp=$(mktemp -t yazi-cwd.XXXXXX); trap "rm -f $tmp" EXIT; yazi --cwd-file="$tmp"; [[ -s "$tmp" ]] && cd "$(<$tmp)"; exec zsh -i'
bindd = SUPER SHIFT,     B,      Browser,           exec, $browser
bindd = SUPER SHIFT ALT, B,      Browser (private), exec, $browser --private
bindd = SUPER SHIFT,     M,      Music,             exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT,     N,      Editor,            exec, omarchy-launch-editor
bindd = SUPER SHIFT,     T,      Activity,          exec, omarchy-launch-tui btop
bindd = SUPER SHIFT,     D,      Docker,            exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT,     G,      Signal,            exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT,     O,      Obsidian,          exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT,     W,      Typora,            exec, uwsm-app -- typora
bindd = SUPER SHIFT,     SLASH,  Passwords,         exec, uwsm-app -- 1password

# -- Web Applications --
# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT,      A, ChatGPT,         exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT,  A, Grok,            exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT,      C, Calendar,        exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT,      E, Email,           exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT,      Y, YouTube,         exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT,  G, WhatsApp,        exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT,      P, Google Photos,   exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT,      X, X,               exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT,  X, X Post,          exec, omarchy-launch-webapp "https://x.com/compose/post"

# ==============================================================================
# Custom Overrides
# ==============================================================================

unbind = SUPER, W
unbind = SUPER, K
unbind = SUPER SHIFT, SLASH
unbind = SUPER SHIFT, W

bind  = SUPER, W,            killactive
bindd = SUPER, K,            Sesh sessions,      exec, omarchy-launch-sesh
bindd = SUPER SHIFT, SLASH,  Show key bindings,  exec, omarchy-menu-keybindings
bindd = SUPER SHIFT, W,      Motion Wallpaper,   exec, $HOME/.local/bin/motion-wallpaper-toggle

# ==============================================================================
# Workspace Shortcuts
# ==============================================================================
unbind = SUPER, code:49
bindd = SUPER,       code:49, Switch to workspace 0 (dead key),    workspace,       name:0
bindd = SUPER SHIFT, code:49, Move app to workspace 0 (dead key),  movetoworkspace, name:0

# ==============================================================================
# Window Management
# ==============================================================================

# -- Split & Float --
unbind = SUPER, V
unbind = SUPER, T
bind  = SUPER, V,         swapsplit
bind  = SUPER, M,         fullscreen, 1
bind  = SUPER, T,         exec, hyprctl --batch "dispatch togglefloating; dispatch centerwindow"
bindd = SUPER, BACKSLASH, Toggle window split, togglesplit

# -- Focus Navigation --
unbind = SUPER, H
unbind = SUPER, J
unbind = SUPER, L
bindd = SUPER, H, Move window focus left,  movefocus, l
bindd = SUPER, J, Move window focus down,  movefocus, d
bindd = SUPER, K, Move window focus up,    movefocus, u
bindd = SUPER, L, Move window focus right, movefocus, r

# -- Window Moving --
bindd = SUPER CTRL ALT, H, Move window left,  movewindow, l
bindd = SUPER CTRL ALT, J, Move window down,  movewindow, d
bindd = SUPER CTRL ALT, K, Move window up,    movewindow, u
bindd = SUPER CTRL ALT, L, Move window right, movewindow, r

# -- Window Swapping --
bindd = SUPER CTRL SHIFT, H, Swap window left,  swapwindow, l
bindd = SUPER CTRL SHIFT, J, Swap window down,  swapwindow, d
bindd = SUPER CTRL SHIFT, K, Swap window up,    swapwindow, u
bindd = SUPER CTRL SHIFT, L, Swap window right, swapwindow, r

# -- Window Resizing --
bind = SUPER SHIFT, H, resizeactive, -100 0
bind = SUPER SHIFT, J, resizeactive, 0  100
bind = SUPER SHIFT, K, resizeactive, 0 -100
bind = SUPER SHIFT, L, resizeactive,  100 0

# ==============================================================================
# Display
# ==============================================================================
bind = SUPER SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")
bind = SUPER SHIFT, mouse_up,   exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = SUPER SHIFT, Z,          exec, hyprctl keyword cursor:zoom_factor 1

# ==============================================================================
# System Maintenance
# ==============================================================================
bindd = SUPER ALT, C, Clean caches & free memory, exec, uwsm-app -- clean-memory
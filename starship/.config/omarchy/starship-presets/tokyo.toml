"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](color_os)\
$os\
[¯é░](bg:color_dir fg:color_os)\
$directory\
[¯é░](fg:color_dir bg:color_git)\
$git_branch\
$git_status\
[¯é░](fg:color_git bg:color_lang)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$custom\
$line_break\
$character"""

palette = 'omarchy_theme'

[palettes.omarchy_theme]
color_bg = '#1a0530'
color_text = '#ffb3d1'
color_comment = '#6b2060'
color_os = '#2d0848'
color_dir = '#d42b6a'
color_git = '#8b2070'
color_lang = '#ff8fb0'
color_vim_insert = '#ff4d8f'
color_vim_normal = '#9b3080'
color_vim_visual = '#ffb3c8'

[os]
disabled = false
style = "bg:color_os fg:color_text"
format = '[¾▒Éî ]($style)'

[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = ""
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = ""
Amazon = ""
Android = ""
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = ""
CentOS = ""
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = ""

[username]
show_always = true
style_user = "bg:color_lang fg:color_bg"
style_root = "bg:color_lang fg:color_os"
format = '[ $user ]($style)'

[directory]
style = "fg:color_bg bg:color_dir"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ï "

[git_branch]
symbol = ""
style = "fg:color_bg bg:color_git"
format = '[[ $symbol $branch ]($style)]($style)'

[git_status]
style = "fg:color_bg bg:color_git"
format = '[[($all_status$ahead_behind )]($style)]($style)'

[nodejs]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[c]
symbol = " "
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[cpp]
symbol = " "
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[rust]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[golang]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[php]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[java]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[kotlin]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[haskell]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[python]
symbol = ""
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'


[time]
disabled = false
time_format = "%R"
style = "bg:color_bg"
format = '[[ ´É║ $time ](fg:color_text bg:color_bg)]($style)'

[line_break]
disabled = false

[custom.zvm_visual_arrow_before]
command = 'echo ¯é░'
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'bg:color_vim_visual fg:color_lang'
format = '[$output]($style)'

[custom.zvm_visual]
command = 'echo visual'
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_vim_visual'
format = '[ $output]($style)'

[custom.zvm_visual_arrow_after]
command = 'echo ¯é┤ '
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'fg:color_vim_visual'
format = '[$output]($style) '

[custom.zvm_normal_arrow_before]
command = 'echo ¯é░'
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'bg:color_vim_normal fg:color_lang'
format = '[$output]($style)'

[custom.zvm_replace]
command = 'echo normal'
when = 'case "$ZVM_MODE" in r) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_lang'
format = '[ $output]($style)'

[custom.zvm_normal]
command = 'echo normal'
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_vim_normal'
format = '[ $output]($style)'

[custom.zvm_normal_arrow_after]
command = 'echo ¯é┤ '
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'fg:color_vim_normal'
format = '[$output]($style) '

[custom.zvm_insert_ok_arrow_before]
command = 'echo ¯é░'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'bg:color_vim_insert fg:color_lang'
format = '[$output]($style)'

[custom.zvm_insert_ok]
command = 'echo insert'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'inverted bg:transparent fg:color_vim_insert'
format = '[ $output]($style)'

[custom.zvm_insert_err]
command = 'echo insert'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ]'
style = 'inverted bg:transparent fg:color_os'
format = '[ $output]($style)'

[custom.zvm_insert_ok_arrow_after]
command = 'echo ¯é┤ '
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'fg:color_vim_insert'
format = '[$output]($style) '

[character]
success_symbol = ""
error_symbol = ""
vimcmd_symbol = ""
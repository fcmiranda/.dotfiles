[tui]
percentage = 45
min = 5
max = 20

[preview]
show = true
wrap = true


[start]
additional_commands = ["", "zoxide query -l 2>/dev/null | tr '\\n' '\\0'"]

[start.command]
cmd = '''
if command -v fd >/dev/null 2>&1; then
  fd --hidden --strip-cwd-prefix --print0 --exclude .git
else
  find . -print0
fi
'''
separator = "\\0"

[query]
prompt_style.fg = 'cyan'
status_inline = true

[[preview.layout]]
command = 'if [ -d {} ]; then eza -T --icons --color=always --level=3 {}; else bat --style=numbers --color=always --line-range=:300 {}; fi'
side = 'right'
percentage = 80
#border.type = "Plain"
#border.padding = [2, 0]
title = "{item}"
border.title_fg = 'Yellow'
gap = 1

[results]
scroll_wrap = true
wrap = false
autoscroll.end = true
autoscroll.context = 0
reverse = false

[matcher]
sort_threshold = 0

[exit]
abort_empty = true

[binds]
"@reloadnext" = "ReloadNext"
"ctrl-z" = "@reloadnext"

[ui.nav_binds]
"ctrl-z" = "@reloadnext"
# Use xdg-open to automatically open images with the default image viewer and videos with mpv
"o" = "ExecuteSilent(xdg-open {=1})"
"~" = ["ChDir(/home/fecavmi)", "Pos(0)", "@reload_local"]
"l" = ["ChDir({=})", "Pos(0)", "@reload_local"]

[breadcrumb]
show = true
separator = "/"
style.fg = "Cyan"
style.modifier = "BOLD"
separator_style.fg = "Cyan"
#current_folder_only = true
#truncate_length = 3
#width_pct = 80

#[action.border]
#color = "cyan"
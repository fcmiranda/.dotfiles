[ui]
nav_mode = true
nav_bar = "Plain"
nav_color = "Black"

[matcher]
sort = false

[results]
reverse = false
icons = true
symlink_target = true
symlink_target_style.fg = "cyan"

[results.autoscroll]
indicator = ""
indicator_style.fg = "blue"

[preview]
media = true

[preview.border]
title_fg = "cyan"
color = "blue"

[[preview.layout]]
command = "if [ -d {1} ]; then eza --tree --level=2 --icons --color=always {1}; else bat --style=numbers --color=always --line-range=:300 {1}; fi"
side = "right"
percentage = 80

[binds]
"@reloadnext" = "ReloadNext"
"ctrl-z" = "@reloadnext"

[ui.nav_binds]
"ctrl-z" = "@reloadnext"
"z" = "@reloadnext"
"l" = ["ChDir({=})", "@reload_local"]
"h" = ["ChDir(..)", "@reload_local"]

[start]
additional_commands = ["", "zoxide query -l 2>/dev/null | tr '\\n' '\\0'"]

[start.command]
command = '''
IGNORE="-E.git -Enode_modules -E.cache -Etarget -Edist -Ebuild -E__pycache__ -E.venv -Evenv -Eenv -Evendor -E.gradle -E.npm -E.pnpm-store -E.next -Eout -Ecoverage -E.tox -E.mypy_cache -E.pytest_cache -E.cargo -E.rustup -E.local -E.mozilla -E.thunderbird"

if [ "$PWD" = "$HOME" ]; then
    {
        zoxide query -l 2>/dev/null | tr '\n' '\0'
        zoxide query -l 2>/dev/null | tr '\n' '\0' | xargs -0 -r fd -H $IGNORE -a --print0 --max-depth 2 . 2>/dev/null
        fd -H $IGNORE -a --print0 . "$HOME" 2>/dev/null
    } | awk -v RS='\0' -v ORS='\0' '!seen[$0]++'
else
    if command -v fd >/dev/null 2>&1; then
        fd -td -H $IGNORE --strip-cwd-prefix --print0 --max-depth 1 . 2>/dev/null
        fd -tf -H $IGNORE --strip-cwd-prefix --print0 --max-depth 1 . 2>/dev/null
        fd -H $IGNORE --strip-cwd-prefix --print0 --min-depth 2 . 2>/dev/null
    else
        find . -print0
    fi
fi
'''
separator = "\\0"
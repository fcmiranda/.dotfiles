"$schema" = 'https://starship.rs/config-schema.json'

# A format that transitions through the theme's colors, inspired by the image's gradient.
format = """
[ν²Ε](color_purple)\
$os\
[ν²Α](bg:color_mid_blue fg:color_purple)\
$directory\
[ν²Α](fg:color_mid_blue bg:color_blue)\
$git_branch\
$git_status\
[ν²Α](fg:color_blue bg:color_purple)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[ν²Α](fg:color_purple bg:color_mid_blue)\
$docker_context\
$conda\
$pixi\
$custom\
$line_break\
$character"""

palette = 'catppuccin_latte_theme'

[palettes.catppuccin_latte_theme]
color_bg = '#eff1f5'
color_foreground = '#4c4f69'
color_comment = '#acb0be'
color_red = '#d20f39'
color_blue = '#1e66f5'
color_mid_blue = '#7287fd'
color_purple = '#8839ef'
color_vim_insert = '#40a02b'
color_vim_normal = '#1e66f5'
color_vim_visual = '#ea76cb'

[os]
disabled = false
style = "bg:color_purple fg:color_bg" # Dark foreground for contrast
# format = '[β‰† ]($style)'
# format = '[σΑâ¹ ]($style)'
# format = '[ ]($style)'
# format = '[σ±ê¨ ]($style)'
# format = '[β‰Ö ]($style)'
 format = '[σΑÖΕ ]($style)'


[os.symbols]
Windows = "σΑç≤"
Ubuntu = "σΑïà"
SUSE = ""
Raspbian = "σΑêΩ"
Mint = "σΑΘ≠"
Macos = "σΑÄΒ"
Manjaro = ""
Linux = "σΑ¨Ϋ"
Gentoo = "σΑΘ®"
Fedora = "σΑΘ¦"
Alpine = ""
Amazon = ""
Android = ""
Arch = "σΑΘ΅"
Artix = "σΑΘ΅"
EndeavourOS = ""
CentOS = ""
Debian = "σΑΘö"
Redhat = "σ±³¦"
RedHatEnterprise = "σ±³¦"
Pop = ""

[username]
show_always = true
style_user = "bg:color_purple fg:color_bg"
style_root = "bg:color_purple fg:color_red"
format = '[ $user ]($style)'

[directory]
style = "fg:color_bg bg:color_mid_blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "βÄΠ/"

[directory.substitutions]
"Documents" = "σΑàô "
"Downloads" = " "
"Music" = "σΑùö "
"Pictures" = " "
"Developer" = "σΑ≤΄ "

[git_branch]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol $branch ](fg:color_bg bg:color_blue)]($style)'

[git_status]
style = "bg:color_blue"
format = '[[($all_status$ahead_behind )](fg:color_bg bg:color_blue)]($style)'

[nodejs]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[c]
symbol = " "
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[cpp]
symbol = " "
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[rust]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[golang]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[php]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[java]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[kotlin]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[haskell]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[python]
symbol = ""
style = "bg:color_purple"
format = '[[ $symbol( $version) ](fg:color_bg bg:color_purple)]($style)'

[docker_context]
symbol = ""
style = "bg:color_mid_blue"
format = '[[ $symbol( $context) ](fg:color_bg bg:color_mid_blue)]($style)'

[conda]
symbol = ""
style = "bg:color_mid_blue"
format = '[[ $symbol( $environment) ](fg:color_bg bg:color_mid_blue)]($style)'

[pixi]
style = "bg:color_mid_blue"
format = '[[ $symbol( $version)( $environment) ](fg:color_bg bg:color_mid_blue)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg"
format = '[[  $time ](fg:color_foreground bg:color_bg)]($style)'

[line_break]
disabled = false

[custom.zvm_visual_arrow_before]
command = 'echo ν²Α'
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'bg:color_vim_visual fg:color_mid_blue'
format = '[$output]($style)'

[custom.zvm_visual]
command = 'echo visual'
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_vim_visual'
format = '[ $output]($style)'

[custom.zvm_visual_arrow_after]
command = 'echo ν²¥ '
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'fg:color_vim_visual'
format = '[$output]($style) '

[custom.zvm_normal_arrow_before]
command = 'echo ν²Α'
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'bg:color_vim_normal fg:color_mid_blue'
format = '[$output]($style)'

[custom.zvm_replace]
command = 'echo normal'
when = 'case "$ZVM_MODE" in r) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_mid_blue'
format = '[ $output]($style)'

[custom.zvm_normal]
command = 'echo normal'
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_vim_normal'
format = '[ $output]($style)'

[custom.zvm_normal_arrow_after]
command = 'echo ν²¥ '
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'fg:color_vim_normal'
format = '[$output]($style) '

[custom.zvm_insert_ok_arrow_before]
command = 'echo ν²Α'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'bg:color_vim_insert fg:color_mid_blue'
format = '[$output]($style)'

[custom.zvm_insert_ok]
command = 'echo insert'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'inverted bg:transparent fg:color_vim_insert'
format = '[ $output]($style)'

[custom.zvm_insert_err]
command = 'echo insert'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ]'
style = 'inverted bg:transparent fg:color_red'
format = '[ $output]($style)'

[custom.zvm_insert_ok_arrow_after]
command = 'echo ν²¥ '
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'fg:color_vim_insert'
format = '[$output]($style) '

[character]
success_symbol = ""
error_symbol = ""
vimcmd_symbol = ""

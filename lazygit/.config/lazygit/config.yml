customCommands:
  - key: '<c-a>'
    context: 'files'
    description: 'AI atomic commits (sgc)'
    command: 'zsh -i -c "sgc"'
    loadingText: 'sgc: analyzing changes…'
    output: terminal
  - key: '<c-g>'
    context: 'files'
    description: 'AI single commit (gc) with confirm'
    prompts:
      - type: 'input'
        title: 'AI commit message (gc)'
        key: 'CommitMessage'
        initialValue: '{{ runCommand "zsh -i -c gc" }}'
      - type: 'confirm'
        title: 'Create commit?'
        body: '{{.Form.CommitMessage}}'
    command: 'git commit -m {{.Form.CommitMessage | quote}}'
    loadingText: 'gc: creating commit…'
    output: terminal

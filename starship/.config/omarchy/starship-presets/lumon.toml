"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ŅéČ](color_os)\
$os\
[Ņé░](bg:color_dir fg:color_os)\
$directory\
[Ņé░](fg:color_dir bg:color_git)\
$git_branch\
$git_status\
[Ņé░](fg:color_git bg:color_lang)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$custom\
$line_break\
$character"""

palette = 'omarchy_theme'

[palettes.omarchy_theme]
color_bg = '#16242d'
color_foreground = '#d6e2ee'
color_comment = '#304860'
color_os = '#1b2d40'
color_dir = '#6fa4c9'
color_git = '#5e95bc'
color_lang = '#6fb8e3'
color_vim_insert = '#8bc9eb'
color_vim_normal = '#6fb8e3'
color_vim_visual = '#b4e4f6'

[os]
disabled = false
style = "bg:color_os fg:color_foreground"
format = '[¾▒Éī ]($style)'

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = ""
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = ""
Amazon = ""
Android = ""
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = ""
CentOS = ""
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = ""

[username]
show_always = true
style_user = "bg:color_lang fg:color_bg"
style_root = "bg:color_lang fg:color_os"
format = '[ $user ]($style)'

[directory]
style = "fg:color_bg bg:color_dir"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ"
"Downloads" = "’Éē"
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ"
"dev" = "¾░▓ŗ"

[git_branch]
symbol = "’Éś"
style = "fg:color_bg bg:color_git"
format = '[[ $symbol $branch ]($style)]($style)'

[git_status]
style = "fg:color_bg bg:color_git"
format = '[[($all_status$ahead_behind )]($style)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[c]
symbol = "Ņś× "
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[cpp]
symbol = "ŅśØ "
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[rust]
symbol = "Ņ×©"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[golang]
symbol = "Ņś¦"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[php]
symbol = "Ņśł"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[java]
symbol = "Ņē¢"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[haskell]
symbol = "Ņś¤"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'

[python]
symbol = "Ņśå"
style = "fg:color_bg bg:color_lang"
format = '[[ $symbol( $version) ]($style)]($style)'


[time]
disabled = false
time_format = "%R"
style = "bg:color_bg"
format = '[[ ’É║ $time ](fg:color_foreground bg:color_bg)]($style)'

[line_break]
disabled = false

[custom.zvm_visual_arrow_before]
command = 'echo Ņé░'
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'bg:color_vim_visual fg:color_lang'
format = '[$output]($style)'

[custom.zvm_visual]
command = 'echo visual'
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_vim_visual'
format = '[ $output]($style)'

[custom.zvm_visual_arrow_after]
command = 'echo Ņé┤ '
when = 'case "$ZVM_MODE" in v|vl) exit 0;; *) exit 1;; esac'
style = 'fg:color_vim_visual'
format = '[$output]($style) '

[custom.zvm_normal_arrow_before]
command = 'echo Ņé░'
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'bg:color_vim_normal fg:color_lang'
format = '[$output]($style)'

[custom.zvm_replace]
command = 'echo normal'
when = 'case "$ZVM_MODE" in r) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_lang'
format = '[ $output]($style)'

[custom.zvm_normal]
command = 'echo normal'
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'inverted bg:transparent fg:color_vim_normal'
format = '[ $output]($style)'

[custom.zvm_normal_arrow_after]
command = 'echo Ņé┤ '
when = 'case "$ZVM_MODE" in n) exit 0;; *) exit 1;; esac'
style = 'fg:color_vim_normal'
format = '[$output]($style) '

[custom.zvm_insert_ok_arrow_before]
command = 'echo Ņé░'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'bg:color_vim_insert fg:color_lang'
format = '[$output]($style)'

[custom.zvm_insert_ok]
command = 'echo insert'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'inverted bg:transparent fg:color_vim_insert'
format = '[ $output]($style)'

[custom.zvm_insert_err]
command = 'echo insert'
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -ne 0 ]'
style = 'inverted bg:transparent fg:color_os'
format = '[ $output]($style)'

[custom.zvm_insert_ok_arrow_after]
command = 'echo Ņé┤ '
when = '[ "${ZVM_MODE:-}" = "i" ] && [ "${STARSHIP_CMD_STATUS:-0}" -eq 0 ]'
style = 'fg:color_vim_insert'
format = '[$output]($style) '

[character]
success_symbol = ""
error_symbol = ""
vimcmd_symbol = ""
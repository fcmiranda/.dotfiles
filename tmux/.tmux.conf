# Tmux configuration file
# Basic settings
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g mouse on
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# status left look and feel
set -g status-left-length 100
set -g status-right ""
set -g status-left " #[fg=blue,bold]#S #[fg=white,nobold]#(gitmux -cfg $HOME/.config/tmux/gitmux.yml) "
set -g status-left-length 300    # increase length (from 10)
set -g status-style 'bg=default' # transparent

# panes
set -g pane-active-border-style 'fg=black,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g allow-passthrough on
set -g message-command-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g mode-style bg=default,fg=yellow


set -g @tmux-nerd-font-window-name-shell-icon 'пЃ”'
set -g @tmux-nerd-font-window-name-show-name false
# tmux battery and tmux online status should be before tmux catppuccin
# Plugin management section
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/sesh'
set -g @plugin 'tmux-plugins/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'git@github.com:joshmedeski/tmux-nerd-font-window-name'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf.)
run '~/.tmux/plugins/tpm/tpm'

# TMUX Status Bar Configuration
# Configure Tmux
set -g status-position top
set -g status-style "bg=default"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g window-status-current-format '#[fg=magenta]пЉЌ #W'
set -g window-status-format ' #[fg=gray]#W'

# bind Scrollback - captures pane with ANSI colors and opens in nvim with baleia.nvim (view-only)
bind-key C-e run-shell "tmux capture-pane -epS - | grep -vE 'о‚°|пѓ§|пђє|пђІ' | sed '/^$/d' > /tmp/tmux_scrollback.ansi && tmux new-window 'nvim -c \"BaleiaColorize\" -c \"setlocal nomodified nomodifiable\" -c \"normal G\" /tmp/tmux_scrollback.ansi'"

# Scrollback
setw -g mode-keys vi

# Use xclip for copying to the system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Increase scroll history
set-option -g history-limit 10000

# start index at 1
set -g base-index 1
set -g pane-base-index 1

# renumber when window is closed
set -g renumber-window on

 # zero-out escape time delay to make key bindings more responsive (especially for vim users)
set -g escape-time 0

# key bindings
set -g prefix C-a
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

# Create vertical split
unbind '|'
bind '|' split-window -h

# Create horizontal split
unbind '-'
bind - split-window -v

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Sesh session management with gum
bind-key "K" display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --placeholder 'Pick a sesh' --prompt='вљЎ'
)\""

# Sesh session management (popup, larger view)
bind-key "P" display-popup -E -w 80% -h 80% "sesh connect \"$(
  sesh list --icons | fzf --no-sort --ansi --prompt 'вљЎ  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(вљЎ  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(рџЄџ  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(вљ™пёЏ  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(рџ“Ѓ  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(рџ”Ћ  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(вљЎ  )+reload(sesh list --icons)'
)\""

# Sesh session management with fzf-tmux
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt 'вљЎ  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(вљЎ  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(рџЄџ  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(вљ™пёЏ  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(рџ“Ѓ  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(рџ”Ћ  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(вљЎ  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

  # Popup utilities
  bind-key "B" display-popup -E -w 90% -h 90% "btop"
  bind-key "G" display-popup -E -w 90% -h 90% "lazygit"
  bind-key "Y" display-popup -E -w 90% -h 90% "yazi"
  bind-key "N" display-popup -E -w 90% -h 90% "nvim"

bind -N "last-session (via sesh) " L run-shell "sesh last"

bind c new-window -c '#{pane_current_path}'

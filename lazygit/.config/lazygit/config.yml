customCommands:
  - key: '<c-a>'
    context: 'files'
    description: 'AI atomic commits (sgc)'
    command: 'zsh -i -c "sgc"'
    loadingText: 'sgc: analyzing changes…'
    output: terminal
  - key: '<c-g>'
    context: 'files'
    description: 'Generate and commit with AI'
    prompts:
      - type: 'input'
        title: 'AI commit message (edit before commit)'
        key: 'CommitMessage'
        initialValue: >-
          {{ runCommand "zsh -lc 'source ~/.zshrc >/dev/null 2>&1; gc --message-only --no-loading --staged-only --silent-empty -p opencode -m opencode/minimax-m2.5-free 2>/dev/null || true'" }}
      - type: 'confirm'
        title: 'Create commit?'
        body: '{{.Form.CommitMessage}}'
    command: 'git commit -m {{.Form.CommitMessage | quote}}'
    loadingText: 'opencode: creating commit…'
    output: terminal
  - key: "<c-l>" # ctrl + l
    description: "pick AI commit"
    command: |
      if [ "{{.Form.Action}}" = "edit" ]; then
        echo "{{.Form.Msg}}" > .git/COMMIT_EDITMSG && nvim .git/COMMIT_EDITMSG && [ -s .git/COMMIT_EDITMSG ] && git commit -F .git/COMMIT_EDITMSG || echo "Commit message is empty, commit aborted."
      else
        git commit -m "{{.Form.Msg}}"
      fi
    context: "files"
    output: terminal
    prompts:
      - type: "menuFromCommand"
        title: "AI Commit Messages"
        key: "Msg"
        command: "lazycommit commit"
        filter: "^(?P<raw>.+)$"
        valueFormat: "{{ .raw }}"
        labelFormat: "{{ .raw | green }}"
      - type: "menu"
        title: "Choose Action"
        key: "Action"
        options:
          - name: "Commit directly"
            description: "Use this message as-is"
            value: "direct"
          - name: "Edit before commit"
            description: "Open in editor first"
            value: "edit"

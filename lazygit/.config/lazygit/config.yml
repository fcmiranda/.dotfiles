customCommands:
  - key: '<c-a>'
    context: 'files'
    description: 'AI atomic commits (sgc)'
    command: 'zsh -i -c "sgc"'
    loadingText: 'sgc: analyzing changes…'
    output: terminal
  - key: '<c-g>'
    context: 'files'
    description: 'Generate and commit with AI'
    prompts:
      - type: 'input'
        title: 'AI commit message (edit before commit)'
        key: 'CommitMessage'
        initialValue: >-
          {{ runCommand "zsh -lc 'source ~/.zshrc >/dev/null 2>&1; gc --message-only --no-loading --staged-only --silent-empty -p opencode -m opencode/minimax-m2.5-free 2>/dev/null || true'" }}
      - type: 'confirm'
        title: 'Create commit?'
        body: '{{.Form.CommitMessage}}'
    command: 'git commit -m {{.Form.CommitMessage | quote}}'
    loadingText: 'opencode: creating commit…'
    output: terminal
  - key: "<c-l>" # ctrl + l
    description: "pick AI commit"
    loadingText: "lazycommit: picking AI commit..."
    command: "zsh -lc '/home/fecavmi/.dotfiles/main/lazygit/.config/lazygit/scripts/pick-ai-commit.sh'"
    context: "files"
    output: terminal
  - key: '<c-e>'
    description: 'Sleep 5 seconds (loading test)'
    command: 'sleep 5'
    context: 'global'
    loadingText: 'Sleeping for 5 seconds...'

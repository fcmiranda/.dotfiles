customCommands:
  - key: '<c-a>'
    context: 'files'
    description: 'AI atomic commits (sgc)'
    command: 'zsh -i -c "sgc"'
    loadingText: 'sgc: analyzing changes…'
    output: terminal
  - key: '<c-g>'
    context: 'files'
    description: 'Generate and commit with AI'
    prompts:
      - type: 'input'
        title: 'AI commit message (edit before commit)'
        key: 'CommitMessage'
        initialValue: >-
          {{ runCommand "zsh -ic 'gc --message-only --no-loading --staged-only -p opencode -m github-copilot/gpt-4o'" }}
      - type: 'confirm'
        title: 'Create commit?'
        body: '{{.Form.CommitMessage}}'
    command: 'git commit -m {{.Form.CommitMessage | quote}}'
    loadingText: 'opencode: creating commit…'
    output: terminal

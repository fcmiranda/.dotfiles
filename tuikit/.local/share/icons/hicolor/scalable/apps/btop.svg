<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1d1b2e"/>
  <!-- CPU chip body -->
  <rect x="156" y="156" width="200" height="200" rx="18" ry="18" fill="none" stroke="#8da9e8" stroke-width="22"/>
  <!-- CPU inner grid lines -->
  <line x1="156" y1="222" x2="356" y2="222" stroke="#8da9e8" stroke-width="10" opacity="0.5"/>
  <line x1="156" y1="256" x2="356" y2="256" stroke="#8da9e8" stroke-width="10" opacity="0.5"/>
  <line x1="156" y1="290" x2="356" y2="290" stroke="#8da9e8" stroke-width="10" opacity="0.5"/>
  <line x1="222" y1="156" x2="222" y2="356" stroke="#8da9e8" stroke-width="10" opacity="0.5"/>
  <line x1="256" y1="156" x2="256" y2="356" stroke="#8da9e8" stroke-width="10" opacity="0.5"/>
  <line x1="290" y1="156" x2="290" y2="356" stroke="#8da9e8" stroke-width="10" opacity="0.5"/>
  <!-- Pin left -->
  <line x1="120" y1="200" x2="156" y2="200" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="120" y1="235" x2="156" y2="235" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="120" y1="270" x2="156" y2="270" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="120" y1="305" x2="156" y2="305" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <!-- Pin right -->
  <line x1="356" y1="200" x2="392" y2="200" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="356" y1="235" x2="392" y2="235" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="356" y1="270" x2="392" y2="270" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="356" y1="305" x2="392" y2="305" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <!-- Pin top -->
  <line x1="200" y1="120" x2="200" y2="156" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="235" y1="120" x2="235" y2="156" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="270" y1="120" x2="270" y2="156" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="305" y1="120" x2="305" y2="156" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <!-- Pin bottom -->
  <line x1="200" y1="356" x2="200" y2="392" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="235" y1="356" x2="235" y2="392" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="270" y1="356" x2="270" y2="392" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
  <line x1="305" y1="356" x2="305" y2="392" stroke="#8da9e8" stroke-width="14" stroke-linecap="round"/>
</svg>

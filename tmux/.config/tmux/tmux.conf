# Tmux configuration file
# Basic settings
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g mouse on
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g extended-keys on

# Colors from current Omarchy theme (auto-generated)
source-file ~/.config/omarchy/current/theme/tmux-colors.conf

# panes
set -g allow-passthrough on
# message/mode styles are set directly in the generated tmux-colors.conf


set -g @tmux-nerd-font-window-name-shell-icon ''
set -g @tmux-nerd-font-window-name-show-name false
# tmux battery and tmux online status should be before tmux catppuccin
# Plugin management section
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf|mm)(diff)?(-wrapped)?'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'


# Nerdfont characters
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"
TRIANGLE_OPEN="#(printf '\uE0B2')"
TRIANGLE_CLOSE="#(printf '\uE0B0')"

set-option -g status-position top
set-option -g status 2

# Fake bottom margin under the top bar with an empty second status row
set-option -g status-format[1] " "

# Basic colors of the Statusbar are set in the generated tmux-colors.conf

# Show the window list centered between the left and the right section
set-option -g status-justify left

# Style and set contents on the left section
# Pill background turns CURRENT_COLOR when prefix is active
set-option -g status-left "\
#[fg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}}},bg=default]${HALF_ROUND_OPEN}\
#[bg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}}},fg=#{?pane_in_mode,#{@SESSION_ACTIVE_FG},#{?client_prefix,#{@SESSION_ACTIVE_FG},#{@SESSION_COLOR}}}]#{?client_prefix,⌨ ,}#S \
#[fg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}}},bg=default]${TRIANGLE_CLOSE}  \
"

# Style and set contents on the right section
# @ai_agent_bell is set by hooker.ts when OpenCode needs attention (clears after 7s)
set-option -g status-right "\
#{@ai_agent_bell}\
#[fg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}}},bg=default]${TRIANGLE_OPEN}\
#[bg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}}},fg=#{?pane_in_mode,#{@SESSION_ACTIVE_FG},#{?client_prefix,#{@SESSION_ACTIVE_FG},#{@HOST_COLOR}}}] 󰮯 󱙝󱙝󱙝 \
#[fg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@SEGMENT_BG}}},bg=default]${HALF_ROUND_CLOSE}   \
"

# Set max length of left and right section
set-option -g status-left-length 100
set-option -g status-right-length 100

# Refresh status bar every second — drives non-busy state transitions immediately
set -g status-interval 1

# Default global empty so windows without opencode show nothing
set -g @ai_agent_state ""

# Lazygitrs session icon — set by lazygit-hook.mjs when lazygitrs is online
set -g @lazygitrs_icon ""

# Bell segment — cleared by hooker.ts after 7s; init empty to avoid stale display
set -g @ai_agent_bell ""

# New windows/sessions inherit window options from whichever window was active — reset on creation
set-hook -g after-new-window  'set-option -w @ai_agent_state ""; set-option -w @lazygitrs_icon ""'
set-hook -g after-new-session 'set-option -w @ai_agent_state ""; set-option -w @lazygitrs_icon ""'

# Style and set content for the inactive windows
# Shows agent state and lazygitrs icon when connected
set-option -g window-status-format "  #I:#W#{?#{@ai_agent_state}, #{@ai_agent_state}, }#{?#{@lazygitrs_icon},#{@lazygitrs_icon} ,} "

# Active window: hide only busy spinner, but show attention states (question/permission/idle)
set-option -g window-status-current-format "  #[fg=#{@CURRENT_COLOR},bold]󰧞 #W#{?#{==:#{@ai_agent_state_raw},busy},,#{?#{@ai_agent_state}, #{@ai_agent_state}, }}#{?#{@lazygitrs_icon},#{@lazygitrs_icon} ,}  "


# Use spacing as the separator for a cleaner look
set-option -g window-status-separator " "

# pane border look and feel
# pane-border-style is set in the generated tmux-colors.conf
set -g pane-active-border-style "fg=#{?pane_in_mode,#{@COPY_COLOR},#{?client_prefix,#{@PREFIX_COLOR},#{@ACTIVE_BORDER_COLOR}}},bg=default"
setw -g pane-border-status off
setw -g pane-border-format ""
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on

# Window Activity Monitoring (Highlight tabs when background panes have output)
# When 'monitor-activity' is ON, apps that stream to stdout (like 'agy') will highlight the tab.
# Apps with TUIs (like 'opencode') usually don't trigger it.
# To disable the highlight effect, change 'on' to 'off'.
setw -g monitor-activity off
set -g visual-activity off

# bind Scrollback - captures pane with ANSI colors and opens in nvim with baleia.nvim (view-only)
bind-key C-e run-shell "tmux capture-pane -epS - | grep -vE '|||' | sed '/^$/d' > /tmp/tmux_scrollback.ansi && tmux new-window 'nvim -c \"BaleiaColorize\" -c \"setlocal nomodified nomodifiable\" -c \"normal G\" /tmp/tmux_scrollback.ansi'"

# Scrollback
setw -g mode-keys vi

# Use xclip for copying to the system clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Increase scroll history
set-option -g history-limit 10000

# start index at 1
set -g base-index 0
set -g pane-base-index 0

# renumber when window is closed
set -g renumber-window on

 # zero-out escape time delay to make key bindings more responsive (especially for vim users)
set -g escape-time 0

# key bindings
set -g prefix C-Space
bind C-Space send-prefix
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

# Create vertical split
unbind '|'
bind '|' split-window -h

# Create horizontal split
unbind '-'
bind - split-window -v

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# OpenCode bell: open notifying window inside a FloaX-style popup (prefix+q to close popup)
bind i run-shell "~/.config/tmux/ai-agent-bell-popup.sh"
bind q detach-client

# Switch windows directly with Ctrl+number (no prefix needed)
bind-key -n 'C-`' select-window -t 0
bind-key -n 'C-1' select-window -t 1
bind-key -n 'C-2' select-window -t 2
bind-key -n 'C-3' select-window -t 3
bind-key -n 'C-4' select-window -t 4
bind-key -n 'C-5' select-window -t 5
bind-key -n 'C-6' select-window -t 6
bind-key -n 'C-7' select-window -t 7
bind-key -n 'C-8' select-window -t 8
bind-key -n 'C-9' select-window -t 9

# Move current window to a target index (shifts windows in between) with Ctrl+Shift+number
bind-key -n 'C-S-0' run-shell "~/.config/tmux/move-window-to.sh 0"
bind-key -n 'C-S-1' run-shell "~/.config/tmux/move-window-to.sh 1"
bind-key -n 'C-S-2' run-shell "~/.config/tmux/move-window-to.sh 2"
bind-key -n 'C-S-3' run-shell "~/.config/tmux/move-window-to.sh 3"
bind-key -n 'C-S-4' run-shell "~/.config/tmux/move-window-to.sh 4"
bind-key -n 'C-S-5' run-shell "~/.config/tmux/move-window-to.sh 5"
bind-key -n 'C-S-6' run-shell "~/.config/tmux/move-window-to.sh 6"
bind-key -n 'C-S-7' run-shell "~/.config/tmux/move-window-to.sh 7"
bind-key -n 'C-S-8' run-shell "~/.config/tmux/move-window-to.sh 8"
bind-key -n 'C-S-9' run-shell "~/.config/tmux/move-window-to.sh 9"

# Sesh session management with matchmaker
bind-key "T" run-shell "~/.config/tmux/sesh-picker.sh"

# Fast AI Ergonomic Keybindings (Zero-Prefix & Popups)
bind-key -n M-o display-popup -E -w 80% -h 80% -b rounded -T " OpenCode " "opencode"
bind-key -n M-a run-shell 'tmux select-window -t ai 2>/dev/null || tmux new-window -n ai "opencode"'
bind-key o run-shell 'pane_cnt=$(tmux list-panes | wc -l); if [ "$pane_cnt" -gt 1 ]; then tmux kill-pane -t :.+; else tmux split-window -h -l 35% "opencode"; fi'

# Popup utilities
bind-key "B" display-popup -E -w 90% -h 90% "btop"
bind-key "g" if-shell -F '#{==:#{session_name},_popups}' detach-client "run-shell \"~/.config/tmux/lazygitrs-popup.sh '#{pane_current_path}'\""
bind-key "Y" display-popup -E -w 90% -h 90% "yazi"
bind-key "N" display-popup -E -w 90% -h 90% "nvim"
bind-key "C" clock-mode

# Window navigation (vim 2motions)
bind -r l next-window
bind -r h previous-window
bind -r Tab last-window
bind -r w kill-pane
bind-key -r t new-window -c '#{pane_current_path}'
bind -r c choose-window

# Window picker with Matchmaker (reads tmux options populated by acpd)

bind-key "s" run-shell "~/.config/tmux/window-picker.sh"
bind-key "S" run-shell "~/.config/tmux/window-picker.sh --fullscreen"
unbind 'D'
unbind O

# Session navigation
bind L switch-client -n  # next session
bind H switch-client -p  # prev session
bind W kill-session      # kill current session

# Pane resize (repeatable with prefix held)
bind -r C-S-h resize-pane -L 5
bind -r C-S-j resize-pane -D 5
bind -r C-S-k resize-pane -U 5
bind -r C-S-l resize-pane -R 5

bind -N "last-session (via script)" L run-shell "~/.config/tmux/last-session.sh"

# Tell tpm to use ~/.tmux/plugins/ regardless of XDG detection
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf.)
run '~/.tmux/plugins/tpm/tpm'
